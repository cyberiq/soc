# Nginx Configuration with WAF
# ضع هذا الملف في /etc/nginx/sites-available/your-site
# ثم رابط إليه من /etc/nginx/sites-enabled/

upstream waf {
    server 127.0.0.1:5000;
    keepalive 32;
}

upstream your_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Server block للـ HTTP - إعادة توجيه إلى HTTPS
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    
    # إعادة توجيه كل الطلبات إلى HTTPS
    return 301 https://$server_name$request_uri;
}

# Server block الرئيسي - HTTPS
server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;
    
    # شهادة SSL
    ssl_certificate /etc/ssl/certs/your-cert.crt;
    ssl_certificate_key /etc/ssl/private/your-key.key;
    
    # إعدادات SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1h;
    ssl_session_cache shared:SSL:10m;
    
    # Headers الأمان
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # حد الحجم للـ Request
    client_max_body_size 10M;
    
    # Timeout Settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Access Log
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # الصفحات الثابتة (Static Files)
    location /static/ {
        alias /var/www/your-app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # الـ API الخاص بـ WAF (للإدارة فقط)
    location /api/stats {
        allow 127.0.0.1;
        allow YOUR_ADMIN_IP;  # استبدل بـ IP الإدارة
        deny all;
        proxy_pass http://waf;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/health {
        proxy_pass http://waf;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/visitors {
        allow 127.0.0.1;
        allow YOUR_ADMIN_IP;  # استبدل بـ IP الإدارة
        deny all;
        proxy_pass http://waf;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/test-telegram {
        allow 127.0.0.1;
        allow YOUR_ADMIN_IP;  # استبدل بـ IP الإدارة
        deny all;
        proxy_pass http://waf;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/unban/ {
        allow 127.0.0.1;
        allow YOUR_ADMIN_IP;  # استبدل بـ IP الإدارة
        deny all;
        proxy_pass http://waf;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # جميع الطلبات الأخرى تمر من خلال WAF أولاً
    location / {
        # تمرير الطلب إلى WAF أولاً
        proxy_pass http://waf;
        
        # Headers ضرورية
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # معالج الأخطاء المخصصة
    error_page 403 /errors/403.html;
    error_page 429 /errors/429.html;
    error_page 500 502 503 504 /errors/5xx.html;
}

# Server block لإعادة توجيه النطاق الفرعي
server {
    listen 443 ssl http2;
    server_name admin.your-domain.com;
    
    ssl_certificate /etc/ssl/certs/your-cert.crt;
    ssl_certificate_key /etc/ssl/private/your-key.key;
    
    # فقط للمسؤولين
    allow YOUR_ADMIN_IP;
    deny all;
    
    location / {
        proxy_pass http://waf;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
